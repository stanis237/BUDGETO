name: budgeto
description: Budgeto - Votre gestion de budget simple et intelligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  provider: ^6.1.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  uuid: ^4.4.0
  flutter_slidable: ^3.1.0
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.8
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.3
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/goals/
    - assets/images/
